<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merge PDF</title>

  <!-- Global CSS -->
  <link rel="stylesheet" href="../css/main.css?v=2" />
  <link rel="stylesheet" href="../css/tool-layout.css?v=2" />
  <link rel="stylesheet" href="../css/merge.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body data-root="..">

  <!-- Header -->
  <div id="header"></div>

  <main class="tool-workspace-layout merge-pdf" id="mergePdfMain">
    <div class="upload-section">
      <h1>Merge PDF Files</h1>
      <p>Select multiple PDF files and merge them into a single document.</p>
      <div class="pdfInputBtn add-pdf">
        <span>Choose PDFs</span>
        <input type="file" id="pdfInput" class="pdfInput" name="pdfFile" accept="application/pdf" multiple />
      </div>
    </div>

    <div id="previewContainer" class="cards-grid hidden">
    </div>

    <form action="" class="tool-page hidden" id="mergeForm">
      <div class="tool-form">
        <h1>Merge PDF Files</h1>
        <p>Select multiple PDF files and merge them into a single document.</p>
        <!-- Tool form buttons -->
        <div class="tool-form-btn">
          <button type="button" class="tool-btn secondary add-pdf" id="addPdfBtn">
            + Add PDFs
          </button>
          <button type="submit" class="tool-btn primary btn-merge-pdf" id="mergeBtn" disabled>Merge PDFs</button>
          <button type="button" class="tool-btn success download-btn hidden" id="downloadMergedBtn">
            ⬇ Download
          </button>
        </div>
      </div>
    </form>
  </main>



  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/include.js"></script>
  <script src="../js/merge.js"></script>
</body>

</html>
