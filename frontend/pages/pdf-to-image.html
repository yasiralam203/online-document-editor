<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF To Image</title>
    <!-- Global CSS -->
    <link rel="stylesheet" href="../css/main.css?v=2">
    <link rel="stylesheet" href="../css/tool-layout.css?v=2">
    <link rel="stylesheet" href="../css/pdf-to-image.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body data-root="..">

    <!-- Header -->
    <div id="header"></div>

    <main class="tool-workspace-layout pdf-to-image" id="pdfMainSection">
        <div class="upload-section">
            <h1>Convert PDF To Images</h1>
            <p>Select one or multiple PDFs and convert them into images</p>
            <div class="pdfInputBtn add-pdf">
                <span>Choose PDFs</span>
                <input type="file" id="pdfInput" class="pdfInput" name="pdfFile" accept="application/pdf" multiple />
            </div>
        </div>

        <div id="previewContainer" class="cards-grid hidden">
        </div>


        <form action="" class="tool-page hidden" id="pdfToImage">
            <div class="tool-form">
                <h1>Convert PDF To Images</h1>
                <p>Select one or multiple PDFs and convert them into images</p>
                <!--tool - form -->
                <div class="tool-form-btn">
                    <button type="button" class="tool-btn secondary add-pdf" id="addPdfBtn">
                        + Add PDFs
                    </button>
                    <button type="submit" class="tool-btn primary btn-convert-image" id="pdfToImageBtn" disabled>Convert
                        to Image</button>
                    <button type="button" class="tool-btn success download-btn hidden" id="downloadPdfImageBtn">
                        ⬇ Download
                    </button>
                </div>
            </div>
        </form>


    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="../js/include.js"></script>
    <script src="../js/pdf-to-image.js"></script>
</body>

</html>
