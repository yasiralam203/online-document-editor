<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image To Pdf</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="../css/main.css?v=2">
    <link rel="stylesheet" href="../css/tool-layout.css?v=2">
    <link rel="stylesheet" href="../css/image-to-pdf.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body data-root="..">

    <!-- Header -->
    <div id="header"></div>

    <main class="tool-workspace-layout image-to-pdf" id="imgMainSection">
        <div class="upload-section">
            <h1>Convert Image To PDFs</h1>
            <p>Select one or multiple images and convert them into single PDFs</p>
            <div class="imgInputBtn add-image">
                <span>Choose Images</span>
                <input type="file" id="imgInput" class="imgInput" name="imgFile" accept="image/*" multiple />
            </div>
        </div>

        <div id="previewContainer" class="cards-grid hidden">
        </div>


        <form action="" class="tool-page hidden" id="imgToPdf">
            <div class="tool-form">
                <h1>Convert Image To PDFs</h1>
                <p>Select one or multiple images and convert them into single PDFs</p>
                <!--tool - form -->
                <div class="tool-form-btn">
                    <button type="button" class="tool-btn secondary add-image" id="addImgBtn">
                        + Add Images
                    </button>
                    <button type="submit" class="tool-btn primary btn-convert-pdf" id="imgToPdfBtn" disabled>Convert to
                        PDF</button>
                    <button type="button" class="tool-btn success download-btn hidden" id="downloadImagePdfBtn">
                        ⬇ Download
                    </button>
                </div>
            </div>
        </form>
    </main>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
  <script src="../js/include.js"></script>
    <script src="../js/image-to-pdf.js"></script>
</body>

</html>
